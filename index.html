<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLT35021 DAPA Assessment Timetable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --dapa-primary: #532A8C; --dapa-background: #F2F2F2; }
        body { font-family: 'Inter', sans-serif; background-color: var(--dapa-background); position: relative; min-height: 100vh; }
        .unit-header { background-color: #f3e8ff; border-left: 4px solid var(--dapa-primary); }
        
        /* Version Watermark Style */
        #version-tag {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(83, 42, 140, 0.1);
            color: #532A8C;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: bold;
            pointer-events: none;
            z-index: 9999;
        }

        @media print { 
            .no-print { display: none !important; } 
            #version-tag { display: none !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="version-tag" class="no-print">07:08am</div>

    <div id="capture-area" class="max-w-6xl mx-auto bg-white rounded-xl shadow-2xl p-6 md:p-10">
        
        <header class="text-center mb-8 pb-4 border-b-2 border-[#532A8C]">
            <img src="dapa-logo.png" alt="DAPA Logo" class="mx-auto h-16 mb-4 object-contain" onerror="this.src='https://placehold.co/150x60?text=DAPA+LOGO'">
            <h1 class="text-3xl font-extrabold text-[#532A8C]">HLT35021 DAPA Assessment Timetable</h1>
        </header>

        <div class="no-print grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 p-6 bg-gray-50 rounded-lg border">
            <div><label class="block text-sm font-bold text-gray-700">Student Number</label><input type="text" id="s-num" class="w-full mt-1 p-2 border rounded" placeholder="Search ID..."></div>
            <div><label class="block text-sm font-bold text-gray-700">Student Name</label><input type="text" id="s-name" class="w-full mt-1 p-2 border rounded bg-gray-100" readonly></div>
            <div><label class="block text-sm font-bold text-gray-700">TPP End Date</label><input type="date" id="s-date" class="w-full mt-1 p-2 border rounded border-[#532A8C]"></div>
        </div>

        <div class="overflow-hidden rounded-lg border shadow-sm">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-[#532A8C]">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-bold text-white uppercase">Unit | Element</th>
                        <th class="px-4 py-3 text-left text-xs font-bold text-white uppercase w-1/3">Planned Start / End</th>
                        <th class="px-4 py-3 text-center text-xs font-bold text-white uppercase">Submission Date</th>
                    </tr>
                </thead>
                <tbody id="t-body" class="bg-white divide-y divide-gray-200 text-sm">
                    <tr><td colspan="3" class="p-10 text-center text-gray-400">Search for a student to load timetable.</td></tr>
                </tbody>
            </table>
        </div>

        <div class="no-print mt-8 flex justify-center gap-4">
            <button id="btn-sync" class="bg-[#532A8C] text-white px-8 py-3 rounded-lg font-bold shadow-lg hover:bg-purple-800 disabled:opacity-50" disabled>Sync & Upload Plan</button>
        </div>
    </div>

    <script>
        const CODESPACE_PROXY_URL = window.location.origin;
        const $ = (id) => document.getElementById(id);
        let taskData = [];

        async function init() {
            try {
                const res = await fetch('TIMETABLE_DATA.csv');
                const text = await res.text();
                taskData = text.trim().split('\n').slice(1).map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return { unit: cols[0], desc: cols[1], task: cols[2], taskDesc: cols[3], days: parseInt(cols[4]) || 1 };
                });
            } catch (e) { console.error("CSV error", e); }
            
            $('s-num').addEventListener('input', debounceLookup);
            $('s-date').addEventListener('change', generateTimetable);
        }

        let lookupTimer;
        function debounceLookup() {
            clearTimeout(lookupTimer);
            const val = $('s-num').value;
            if (val.length < 3) return;
            lookupTimer = setTimeout(async () => {
                const res = await fetch(`${CODESPACE_PROXY_URL}/api/lookup-student?studentId=${val}`);
                const data = await res.json();
                if (data.success) {
                    $('s-name').value = `${data.firstName} ${data.surname}`;
                    const enRes = await fetch(`${CODESPACE_PROXY_URL}/api/check-enrolment?partyId=${data.partyId}`);
                    const enData = await enRes.json();
                    if (enData.success) {
                        if (enData.endDate) {
                            $('s-date').value = enData.endDate;
                            generateTimetable();
                        }
                        $('btn-sync').disabled = false;
                    }
                }
            }, 600);
        }

        function generateTimetable() {
            const endDateVal = $('s-date').value;
            if (!endDateVal || taskData.length === 0) return;

            let currentCursor = new Date(endDateVal);
            const body = $('t-body'); body.innerHTML = '';
            
            const grouped = taskData.reduce((acc, task) => {
                if (!acc[task.unit]) acc[task.unit] = { desc: task.desc, tasks: [] };
                acc[task.unit].tasks.push(task);
                return acc;
            }, {});

            const unitsReverse = Object.keys(grouped).reverse();
            const result = [];

            unitsReverse.forEach(uKey => {
                const group = grouped[uKey];
                const processedTasks = [];
                
                [...group.tasks].reverse().forEach(t => {
                    const d = new Date(currentCursor);
                    processedTasks.push({ ...t, dateStr: d.toLocaleDateString('en-GB') });
                    currentCursor.setDate(currentCursor.getDate() - t.days);
                });

                const tasksInOrder = processedTasks.reverse();
                result.push({
                    unit: uKey,
                    desc: group.desc,
                    tasks: tasksInOrder,
                    displayStart: tasksInOrder[0].dateStr,
                    displayEnd: tasksInOrder[tasksInOrder.length - 1].dateStr
                });
            });

            result.reverse().forEach(unit => {
                const h = body.insertRow();
                h.className = "unit-header font-bold text-[#532A8C]";
                h.innerHTML = `
                    <td class="px-4 py-3">${unit.unit}: ${unit.desc}</td>
                    <td class="px-4 py-3 text-xs">Start: ${unit.displayStart} | End: ${unit.displayEnd}</td>
                    <td></td>
                `;

                unit.tasks.forEach(t => {
                    const r = body.insertRow();
                    r.innerHTML = `
                        <td class="px-4 py-2 pl-10 text-gray-600 border-b">${t.taskDesc}</td>
                        <td class="border-b"></td>
                        <td class="px-4 py-2 text-center font-semibold border-b">${t.dateStr}</td>
                    `;
                });
            });
        }

        window.onload = init;
    </script>
</body>
</html>
